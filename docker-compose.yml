version: '3.9'

# Networking model:
#   - This stack runs behind an external Nginx Proxy Manager (NPM) that
#     terminates TLS and forwards HTTP to this stack's nginx on port 80.
#   - nginx is the ONLY service that publishes a port to the host (80). It
#     reverse-proxies by path:
#         /      -> frontend:3000
#         /api   -> api:8000
#         /docs  -> api:8000
#   - Every other service is reachable only over the internal Docker network
#     (`sgna_internal`) by its service name. `expose` documents the internal
#     ports; it does NOT publish them to the host.
#   - To reach an internal service for maintenance (psql, MinIO console, etc.)
#     use `docker compose exec` or an SSH tunnel instead of publishing a port.

networks:
  internal:
    name: sgna_internal
    driver: bridge

services:
  nginx:
    image: nginx:alpine
    # Only entry point exposed to the host. TLS is terminated upstream by the
    # external Nginx Proxy Manager, which forwards plain HTTP to this port 80.
    ports:
      - "8181:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/sites:/etc/nginx/conf.d
    depends_on:
      - frontend
      - api
    networks:
      - internal

  frontend:
    image: ghcr.io/pel-matiasvaldivia/sgna/frontend:latest
    environment:
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      # Empty -> the browser uses relative URLs (/api/...) served through nginx.
      - NEXT_PUBLIC_API_URL=${API_URL}
      - NEXT_PUBLIC_APP_NAME=AuditoríasEnLínea
    expose:
      - "3000"
    depends_on:
      - api
    networks:
      - internal

  api:
    image: ghcr.io/pel-matiasvaldivia/sgna/backend:latest
    environment:
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - MCP_CLAUDE_API_KEY=${ANTHROPIC_API_KEY}
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - internal

  mcp-server:
    image: ghcr.io/pel-matiasvaldivia/sgna/mcp-server:latest
    environment:
      - API_BASE_URL=http://api:8000
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    # Communicates with the API over the internal network (MCP uses stdio, no
    # inbound HTTP port to expose).
    depends_on:
      - api
    networks:
      - internal

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
    networks:
      - internal

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    # 9000 = S3 API (used by the api service), 9001 = web console. Both internal.
    expose:
      - "9000"
      - "9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
    networks:
      - internal

volumes:
  postgres_data:
  redis_data:
  minio_data:
