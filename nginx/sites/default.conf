server {
    listen 80;
    server_name localhost;

    # --- NextAuth endpoints live on the Next.js FRONTEND (/api/auth/*) ---
    # Must NOT be sent to the backend. nginx picks the longest matching prefix,
    # so /api/auth/ wins over / for these requests.
    location /api/auth/ {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Backend API (FastAPI) is served under /api/v1/* ---
    location /api/v1/ {
        proxy_pass http://api:8000/api/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API documentation (Swagger)
    location /docs {
        proxy_pass http://api:8000/api/v1/docs;
        proxy_set_header Host $host;
    }

    # --- Frontend (everything else, including NextAuth pages) ---
    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
